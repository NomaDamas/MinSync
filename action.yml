name: MinSync PR Sync
description: Sync vector indexes on pull requests with MinSync and post a summary comment.
branding:
  icon: refresh-cw
  color: blue

inputs:
  embedding-api-key:
    description: API key for the embedding provider (mapped to OPENAI_API_KEY).
    required: true
  embedder:
    description: Embedder ID for minsync init.
    required: false
    default: "openai:text-embedding-3-small"
  chunker:
    description: Chunker ID for minsync init.
    required: false
    default: "markdown-heading"
  python-version:
    description: Python version to set up.
    required: false
    default: "3.12"
  minsync-version:
    description: MinSync version to install from PyPI (use "latest" for newest).
    required: false
    default: "latest"
  minsync-extra:
    description: Optional extras for MinSync install (e.g. "zvec").
    required: false
    default: ""
  embedding-packages:
    description: Extra pip packages required by the embedding provider.
    required: false
    default: "langchain-openai"
  ref:
    description: Git ref override (default uses PR head branch).
    required: false
    default: ""
  sync-args:
    description: Extra arguments passed to minsync sync.
    required: false
    default: ""
  verify:
    description: Whether to run minsync verify after sync.
    required: false
    default: "true"
  verify-args:
    description: Extra arguments passed to minsync verify.
    required: false
    default: ""
  comment:
    description: Whether to post/update a PR comment with the sync report.
    required: false
    default: "true"
  working-directory:
    description: Working directory (repository root).
    required: false
    default: "."

outputs:
  sync-result:
    description: "Sync outcome: completed, up-to-date, or error."
    value: ${{ steps.run.outputs.sync-result }}
  verify-result:
    description: JSON string of the verify result.
    value: ${{ steps.run.outputs.verify-result }}
  chunks-added:
    description: Number of chunks added during sync.
    value: ${{ steps.run.outputs.chunks-added }}
  chunks-updated:
    description: Number of chunks updated during sync.
    value: ${{ steps.run.outputs.chunks-updated }}
  chunks-deleted:
    description: Number of chunks deleted during sync.
    value: ${{ steps.run.outputs.chunks-deleted }}
  files-processed:
    description: Number of files processed during sync.
    value: ${{ steps.run.outputs.files-processed }}
  verify-passed:
    description: "Whether verify passed (true/false/empty if skipped)."
    value: ${{ steps.run.outputs.verify-passed }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install MinSync and dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        pkg="MinSync"
        if [ -n "${{ inputs.minsync-extra }}" ]; then
          pkg="MinSync[${{ inputs.minsync-extra }}]"
        fi
        if [ "${{ inputs.minsync-version }}" != "latest" ]; then
          pkg="${pkg}==${{ inputs.minsync-version }}"
        fi
        pip install "${pkg}" ${{ inputs.embedding-packages }}

    - name: Initialize MinSync (if needed)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ ! -d ".minsync" ]; then
          minsync init \
            --embedder "${{ inputs.embedder }}" \
            --chunker "${{ inputs.chunker }}"
        fi
      env:
        OPENAI_API_KEY: ${{ inputs.embedding-api-key }}

    - name: Run MinSync sync and verify
      id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: python "${{ github.action_path }}/action/entrypoint.py"
      env:
        OPENAI_API_KEY: ${{ inputs.embedding-api-key }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_SYNC_ARGS: ${{ inputs.sync-args }}
        INPUT_VERIFY: ${{ inputs.verify }}
        INPUT_VERIFY_ARGS: ${{ inputs.verify-args }}
        PYTHONPATH: ${{ github.action_path }}

    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const marker = '<!-- minsync-action -->';
          const body = process.env.COMMENT_BODY;
          if (!body) return;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body && c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
      env:
        COMMENT_BODY: ${{ steps.run.outputs.comment-body }}
